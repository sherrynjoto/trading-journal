<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e8e8e8;min-height:100vh}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid #1a1a1a;background:#0a0a0a;position:sticky;top:0;z-index:50}
.welcome{font-size:18px;font-weight:600;color:#fff}.welcome span{color:#1D9E75}
.subtitle{font-size:12px;color:#444;margin-top:2px}
.topnav-right{display:flex;align-items:center;gap:12px}
.status-badge{font-size:11px;padding:4px 12px;border-radius:20px;background:rgba(29,158,117,.15);color:#1D9E75;font-weight:500}
.status-badge.offline{background:rgba(239,68,68,.15);color:#ef4444}
.add-btn{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer}
.add-btn:hover{background:#17856a}
.main{display:flex;gap:0;min-height:calc(100vh - 65px)}
.sidebar{width:200px;border-right:1px solid #1a1a1a;padding:20px 0;flex-shrink:0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:#555;cursor:pointer;transition:all .15s}
.sidebar-item:hover{color:#e8e8e8;background:#111}
.sidebar-item.active{color:#e8e8e8;background:#111;border-left:2px solid #1D9E75}
.content{flex:1;padding:24px 32px;overflow-x:hidden;min-width:0}

/* Account Stats Bar */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:16px}
.stat-label{font-size:11px;color:#444;margin-bottom:6px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.stat-val{font-size:22px;font-weight:600;color:#e8e8e8}
.stat-val.pos{color:#1D9E75}
.stat-val.neg{color:#ef4444}
.stat-sub{font-size:11px;color:#333;margin-top:3px}

/* Account Details Row */
.acct-details{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.acct-card{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.acct-card-label{font-size:11px;color:#444;font-weight:500}
.acct-card-val{font-size:13px;font-weight:600;color:#e8e8e8}

/* Chart */
.chart-section{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:20px;margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase}
.tab-row{display:flex;gap:4px}
.tab{font-size:11px;padding:4px 10px;border:1px solid #222;border-radius:20px;cursor:pointer;color:#555;background:none;transition:all .15s}
.tab.active{background:#1a1a1a;color:#e8e8e8;border-color:#333}
.chart-wrap{position:relative;width:100%;height:200px}

/* Calendar */
.cal-section{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:20px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-nav{display:flex;align-items:center;gap:16px}
.cal-nav-btn{background:none;border:1px solid #222;border-radius:6px;padding:4px 10px;cursor:pointer;color:#888;font-size:16px}
.cal-nav-btn:hover{color:#e8e8e8;border-color:#333}
.cal-month-label{font-size:15px;font-weight:600;color:#e8e8e8}
.monthly-pnl{font-size:13px;font-weight:500}
.monthly-pnl.pos{color:#1D9E75}
.monthly-pnl.neg{color:#ef4444}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr) 130px;gap:0}
.cal-dow{text-align:center;font-size:11px;color:#333;padding:8px 4px;font-weight:600;letter-spacing:.04em;border-bottom:1px solid #1a1a1a}
.cal-day{border:0.5px solid #1a1a1a;padding:8px;min-height:80px;cursor:default;transition:all .15s}
.cal-day.has-trade{cursor:pointer}
.cal-day.has-trade:hover{background:#161616;border-color:#2a2a2a}
.cal-day.profit{background:rgba(29,158,117,.05)}
.cal-day.profit:hover{background:rgba(29,158,117,.1) !important}
.cal-day.loss{background:rgba(239,68,68,.05)}
.cal-day.loss:hover{background:rgba(239,68,68,.1) !important}
.cal-day.today{border-color:#1D9E75 !important;border-width:1.5px}
.cal-day.empty{background:transparent;border-color:#111}
.day-num{font-size:11px;color:#333;margin-bottom:6px}
.today-num{background:#1D9E75;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;margin-bottom:6px}
.day-pnl{font-size:12px;font-weight:600}
.day-pnl.pos{color:#1D9E75}
.day-pnl.neg{color:#ef4444}
.day-trades{font-size:10px;color:#333;margin-top:2px}
.week-total-cell{border:0.5px solid #1a1a1a;padding:8px 12px;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;background:#0d0d0d;min-height:80px}
.week-label{font-size:9px;color:#333;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.week-pnl{font-size:13px;font-weight:600}
.week-pnl.pos{color:#1D9E75}
.week-pnl.neg{color:#ef4444}
.week-trades{font-size:10px;color:#333;margin-top:2px}

/* Detail Panel */
.detail-panel{width:340px;border-left:1px solid #1a1a1a;padding:24px;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 65px);position:sticky;top:65px}
.detail-panel.hidden{display:none}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.detail-date{font-size:15px;font-weight:600;color:#fff}
.detail-close{background:none;border:none;color:#444;font-size:18px;cursor:pointer}
.detail-close:hover{color:#e8e8e8}
.detail-summary{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1a1a1a;margin-bottom:16px}
.detail-count{font-size:13px;color:#555}
.detail-pnl-big{font-size:20px;font-weight:600}
.detail-pnl-big.pos{color:#1D9E75}
.detail-pnl-big.neg{color:#ef4444}
.trade-card{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:14px;margin-bottom:10px;border-left:3px solid #222}
.trade-card.profit{border-left-color:#1D9E75}
.trade-card.loss{border-left-color:#ef4444}
.trade-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.trade-sym{font-size:14px;font-weight:600}
.dir-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.dir-badge.buy{background:rgba(29,158,117,.2);color:#1D9E75}
.dir-badge.sell{background:rgba(239,68,68,.2);color:#ef4444}
.trade-pnl-card{font-size:15px;font-weight:600}
.trade-pnl-card.pos{color:#1D9E75}
.trade-pnl-card.neg{color:#ef4444}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item .meta-label{font-size:10px;color:#333;text-transform:uppercase;letter-spacing:.04em}
.meta-item .meta-val{font-size:12px;color:#888;margin-top:2px}

/* Modal */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-wrap.open{display:flex}
.modal{background:#111;border:1px solid #222;border-radius:14px;padding:24px;width:min(480px,94vw);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.modal-x{background:none;border:none;cursor:pointer;color:#444;font-size:20px}
.modal-x:hover{color:#e8e8e8}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;color:#444;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
input,select{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:10px 12px;font-size:13px;color:#e8e8e8;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#1D9E75}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{background:none;border:1px solid #222;border-radius:8px;padding:8px 16px;cursor:pointer;color:#888;font-size:13px}
.btn-save{background:#1D9E75;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;color:#fff;font-size:13px;font-weight:500}
.form-msg{margin-top:10px;font-size:12px;text-align:center;padding:8px;border-radius:6px}
.form-msg.success{background:rgba(29,158,117,.1);color:#1D9E75}
.form-msg.error{background:rgba(239,68,68,.1);color:#ef4444}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;font-size:14px;color:#888}
</style>
</head>
<body>

<div class="topnav">
  <div>
    <div class="welcome">Trading <span>Journal</span></div>
    <div class="subtitle">Personal Trading Tracker</div>
  </div>
  <div class="topnav-right">
    <span class="status-badge" id="statusBadge">● Live</span>
    <button class="add-btn" onclick="openAddModal()">+ Add Trade</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </div>
    <div class="sidebar-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Performance
    </div>
    <div class="sidebar-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </div>
    <div class="sidebar-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Payouts
    </div>
  </div>

  <div class="content">
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Current Balance</div>
        <div class="stat-val" id="m-balance">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Realized P&L</div>
        <div class="stat-val" id="m-pnl">—</div>
        <div class="stat-sub" id="m-pnl-pct"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-val" id="m-wr">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Trades</div>
        <div class="stat-val" id="m-trades">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Trading Days</div>
        <div class="stat-val" id="m-days">—</div>
      </div>
    </div>

    <!-- Account Details -->
    <div class="acct-details">
      <div class="acct-card">
        <div class="acct-card-label">Total Deposited</div>
        <div class="acct-card-val" id="m-deposit">—</div>
      </div>
      <div class="acct-card">
        <div class="acct-card-label">Total Withdrawn</div>
        <div class="acct-card-val" id="m-withdraw">—</div>
      </div>
      <div class="acct-card">
        <div class="acct-card-label">Avg Win</div>
        <div class="acct-card-val pos" id="m-avgwin">—</div>
      </div>
      <div class="acct-card">
        <div class="acct-card-label">Avg Loss</div>
        <div class="acct-card-val neg" id="m-avgloss">—</div>
      </div>
    </div>

    <!-- Equity Chart -->
    <div class="chart-section">
      <div class="section-header">
        <div class="section-title">Equity Growth</div>
        <div class="tab-row">
          <button class="tab" onclick="setRange('1D',this)">1D</button>
          <button class="tab" onclick="setRange('1W',this)">1W</button>
          <button class="tab active" onclick="setRange('1M',this)">1M</button>
          <button class="tab" onclick="setRange('3M',this)">3M</button>
          <button class="tab" onclick="setRange('1Y',this)">1Y</button>
          <button class="tab" onclick="setRange('YTD',this)">YTD</button>
          <button class="tab" onclick="setRange('ALL',this)">All</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="eqChart"></canvas></div>
    </div>

    <!-- Calendar -->
    <div class="cal-section">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <span class="cal-month-label" id="calLabel"></span>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div id="monthlyPnl" class="monthly-pnl"></div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel hidden" id="detailPanel">
    <div class="detail-top">
      <div class="detail-date" id="detailDate"></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-summary">
      <div class="detail-count" id="detailCount"></div>
      <div class="detail-pnl-big" id="detailPnl"></div>
    </div>
    <div id="detailTrades"></div>
  </div>
</div>

<!-- Add Trade Modal -->
<div class="modal-wrap" id="addModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">
      Add Trade
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Symbol</label>
        <select id="f_sym">
          <option>XAUUSD</option><option>EURUSD</option><option>GBPUSD</option>
          <option>USDJPY</option><option>GBPJPY</option><option>AUDUSD</option>
          <option>USDCAD</option><option>NAS100</option><option>BTCUSD</option>
        </select>
      </div>
      <div class="form-group">
        <label>Direction</label>
        <select id="f_dir"><option value="buy">BUY</option><option value="sell">SELL</option></select>
      </div>
      <div class="form-group">
        <label>Open Time</label>
        <input type="datetime-local" id="f_open">
      </div>
      <div class="form-group">
        <label>Close Time</label>
        <input type="datetime-local" id="f_close">
      </div>
      <div class="form-group">
        <label>Entry Price</label>
        <input type="number" id="f_entry" step="0.00001" placeholder="2305.40">
      </div>
      <div class="form-group">
        <label>Exit Price</label>
        <input type="number" id="f_exit" step="0.00001" placeholder="2318.90">
      </div>
      <div class="form-group">
        <label>Lot Size</label>
        <input type="number" id="f_lots" step="0.01" placeholder="0.10">
      </div>
      <div class="form-group">
        <label>PNL ($)</label>
        <input type="number" id="f_pnl" step="0.01" placeholder="135.00">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="submitTrade()" id="submitBtn">Save Trade</button>
    </div>
    <div id="formMsg"></div>
  </div>
</div>

<script>
const API = 'https://trading-journal-b56r.onrender.com';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOWS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

let allTrades = [];
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth();
let eqChart;
let curRange = '1M';

async function loadTrades() {
  try {
    const res = await fetch(API + '/trades');
    allTrades = await res.json();
    document.getElementById('statusBadge').textContent = '● Live';
    document.getElementById('statusBadge').className = 'status-badge';
  } catch(e) {
    document.getElementById('statusBadge').textContent = '● Offline';
    document.getElementById('statusBadge').className = 'status-badge offline';
    allTrades = [];
  }
  renderAll();
}

function getTrades() {
  return allTrades.filter(t => t.direction !== 'deposit' && t.direction !== 'withdrawal');
}

function getDayMap() {
  const map = {};
  getTrades().forEach(t => {
    const d = (t.open_time||'').slice(0,10);
    if(!d) return;
    if(!map[d]) map[d] = {pnl:0, trades:[]};
    map[d].pnl += parseFloat(t.pnl)||0;
    map[d].trades.push(t);
  });
  return map;
}

function getEquityPoints() {
  const sorted = [...allTrades].sort((a,b) => (a.open_time||'').localeCompare(b.open_time||''));
  let bal = 0;
  const dayBal = {};
  sorted.forEach(t => {
    bal += parseFloat(t.pnl)||0;
    const d = (t.open_time||'').slice(0,10);
    if(d) dayBal[d] = parseFloat(bal.toFixed(2));
  });
  return Object.keys(dayBal).sort().map(d => ({d, bal: dayBal[d]}));
}

function filterByRange(points, range) {
  const now = new Date();
  if(range === '1D') {
    return points.slice(-1);
  } else if(range === '1W') {
    const cutoff = new Date(now); cutoff.setDate(now.getDate()-7);
    return points.filter(p => new Date(p.d) >= cutoff);
  } else if(range === '1M') {
    const cutoff = new Date(now); cutoff.setMonth(now.getMonth()-1);
    return points.filter(p => new Date(p.d) >= cutoff);
  } else if(range === '3M') {
    const cutoff = new Date(now); cutoff.setMonth(now.getMonth()-3);
    return points.filter(p => new Date(p.d) >= cutoff);
  } else if(range === '1Y') {
    const cutoff = new Date(now); cutoff.setFullYear(now.getFullYear()-1);
    return points.filter(p => new Date(p.d) >= cutoff);
  } else if(range === 'YTD') {
    return points.filter(p => p.d.startsWith(now.getFullYear()+''));
  }
  return points; // ALL
}

function renderMetrics() {
  const trades = getTrades();
  const deposits = allTrades.filter(t => t.direction==='deposit').reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const withdrawals = allTrades.filter(t => t.direction==='withdrawal').reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const totalPnl = trades.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const balance = deposits + withdrawals + totalPnl;
  const wins = trades.filter(t=>parseFloat(t.pnl)>0);
  const losses = trades.filter(t=>parseFloat(t.pnl)<0);
  const wr = trades.length ? ((wins.length/trades.length)*100).toFixed(0) : 0;
  const avgWin = wins.length ? (wins.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0)/wins.length).toFixed(2) : '0.00';
  const avgLoss = losses.length ? (losses.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0)/losses.length).toFixed(2) : '0.00';
  const dayMap = getDayMap();
  const pnlPct = deposits > 0 ? ((totalPnl/deposits)*100).toFixed(2) : '0.00';

  document.getElementById('m-balance').textContent = '$'+balance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const pnlEl = document.getElementById('m-pnl');
  pnlEl.textContent = (totalPnl>=0?'+':'')+'$'+Math.abs(totalPnl).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  pnlEl.className = 'stat-val '+(totalPnl>=0?'pos':'neg');
  document.getElementById('m-pnl-pct').textContent = (totalPnl>=0?'+':'')+pnlPct+'%';
  const wrEl = document.getElementById('m-wr');
  wrEl.textContent = wr+'%';
  wrEl.className = 'stat-val '+(wr>=50?'pos':'neg');
  document.getElementById('m-trades').textContent = trades.length;
  document.getElementById('m-days').textContent = Object.keys(dayMap).length;
  document.getElementById('m-deposit').textContent = '$'+deposits.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('m-withdraw').textContent = '$'+Math.abs(withdrawals).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('m-avgwin').textContent = '+$'+parseFloat(avgWin).toFixed(2);
  document.getElementById('m-avgloss').textContent = '$'+parseFloat(avgLoss).toFixed(2);
}

function renderEquity(range) {
  if(range) curRange = range;
  const allPoints = getEquityPoints();
  const data = filterByRange(allPoints, curRange);
  const ctx = document.getElementById('eqChart').getContext('2d');
  if(eqChart) eqChart.destroy();
  if(!data.length) return;
  const isPos = data[data.length-1].bal >= (data[0]?.bal||0);
  const color = isPos ? '#1D9E75' : '#ef4444';
  const labels = data.map(x => {
    const d = new Date(x.d);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  });
  eqChart = new Chart(ctx, {
    type:'line',
    data:{labels,datasets:[{
      label:'Balance',data:data.map(x=>x.bal),
      borderColor:color,borderWidth:2,pointRadius:data.length>30?0:3,
      pointBackgroundColor:color,fill:true,
      backgroundColor:isPos?'rgba(29,158,117,.06)':'rgba(239,68,68,.06)',
      tension:.3
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+c.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2})}}},
      scales:{
        x:{ticks:{color:'#333',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{color:'#111'},border:{color:'#1a1a1a'}},
        y:{ticks:{color:'#333',font:{size:10},callback:v=>'$'+v.toLocaleString()},grid:{color:'#161616'},border:{color:'#1a1a1a'}}
      }
    }
  });
}

function setRange(r, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderEquity(r);
}

function renderCal() {
  const dayMap = getDayMap();
  const today = new Date();
  document.getElementById('calLabel').textContent = MONTHS[curMonth]+' '+curYear;

  let monthPnl = 0;
  const prefix = `${curYear}-${String(curMonth+1).padStart(2,'0')}`;
  Object.entries(dayMap).forEach(([d,v]) => { if(d.startsWith(prefix)) monthPnl += v.pnl; });
  const mpEl = document.getElementById('monthlyPnl');
  if(monthPnl!==0) {
    mpEl.textContent = 'Monthly P&L: '+(monthPnl>=0?'+':'')+'$'+Math.abs(monthPnl).toFixed(2);
    mpEl.className = 'monthly-pnl '+(monthPnl>=0?'pos':'neg');
  } else { mpEl.textContent = ''; }

  const firstDay = new Date(curYear,curMonth,1).getDay();
  const daysInMonth = new Date(curYear,curMonth+1,0).getDate();
  const totalCells = Math.ceil((firstDay+daysInMonth)/7)*7;

  let html = DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  html += `<div class="cal-dow" style="font-size:9px">WEEK'S TOTAL</div>`;

  let weekCount = 0;
  for(let cell=0; cell<totalCells; cell++) {
    const col = cell%7;
    if(col===0 && cell>0) {
      // Week total
      weekCount++;
      let wPnl=0, wTrades=0;
      for(let w=cell-7;w<cell;w++) {
        const d=w-firstDay+1;
        if(d>=1&&d<=daysInMonth) {
          const key=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          if(dayMap[key]){wPnl+=dayMap[key].pnl;wTrades+=dayMap[key].trades.length;}
        }
      }
      html += `<div class="week-total-cell">
        <div class="week-label">Week ${weekCount}</div>
        ${wTrades>0?`<div class="week-pnl ${wPnl>=0?'pos':'neg'}">${wPnl>=0?'+':''}$${Math.abs(wPnl).toFixed(2)}</div><div class="week-trades">${wTrades} trade${wTrades!==1?'s':''}</div>`:'<div style="color:#222;font-size:11px">—</div>'}
      </div>`;
    }

    const d = cell-firstDay+1;
    if(d<1||d>daysInMonth) {
      html += `<div class="cal-day empty"></div>`;
    } else {
      const key=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry=dayMap[key];
      const isToday=today.getDate()===d&&today.getMonth()===curMonth&&today.getFullYear()===curYear;
      const cls=['cal-day',entry?(entry.pnl>=0?'profit':'loss'):'',entry?'has-trade':'',isToday?'today':''].join(' ');
      const numHtml=isToday?`<div class="today-num">${d}</div>`:`<div class="day-num">${d}</div>`;
      const pnlHtml=entry?`<div class="day-pnl ${entry.pnl>=0?'pos':'neg'}">${entry.pnl>=0?'+':''}$${Math.abs(entry.pnl).toFixed(2)}</div><div class="day-trades">${entry.trades.length} trade${entry.trades.length!==1?'s':''}</div>`:'';
      html+=`<div class="${cls}" ${entry?`onclick="openDay('${key}')"`:''}>${numHtml}${pnlHtml}</div>`;
    }
  }

  // Last week total
  weekCount++;
  let wPnl=0,wTrades=0;
  for(let w=totalCells-7;w<totalCells;w++) {
    const d=w-firstDay+1;
    if(d>=1&&d<=daysInMonth) {
      const key=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(dayMap[key]){wPnl+=dayMap[key].pnl;wTrades+=dayMap[key].trades.length;}
    }
  }
  html+=`<div class="week-total-cell">
    <div class="week-label">Week ${weekCount}</div>
    ${wTrades>0?`<div class="week-pnl ${wPnl>=0?'pos':'neg'}">${wPnl>=0?'+':''}$${Math.abs(wPnl).toFixed(2)}</div><div class="week-trades">${wTrades} trade${wTrades!==1?'s':''}</div>`:'<div style="color:#222;font-size:11px">—</div>'}
  </div>`;

  document.getElementById('calGrid').innerHTML = html;
}

function openDay(key) {
  const dayMap = getDayMap();
  const entry = dayMap[key];
  if(!entry) return;
  const d = new Date(key+'T00:00:00');
  document.getElementById('detailDate').textContent = d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('detailCount').textContent = `${entry.trades.length} Trade${entry.trades.length!==1?'s':''}`;
  const pEl = document.getElementById('detailPnl');
  pEl.textContent = (entry.pnl>=0?'+':'')+'$'+Math.abs(entry.pnl).toFixed(2);
  pEl.className = 'detail-pnl-big '+(entry.pnl>=0?'pos':'neg');

  document.getElementById('detailTrades').innerHTML = entry.trades.map(t => {
    const pnl = parseFloat(t.pnl)||0;
    const openT = (t.open_time||'').slice(11,16);
    const closeT = (t.close_time||'').slice(11,16);
    let dur = '';
    if(t.open_time && t.close_time) {
      const ms = new Date(t.close_time.replace('T',' '))-new Date(t.open_time.replace('T',' '));
      if(!isNaN(ms)) {
        const h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
        dur = h>0?`${h}h ${m}m`:`${m}m`;
      }
    }
    return `<div class="trade-card ${pnl>=0?'profit':'loss'}">
      <div class="trade-card-top">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="trade-sym">${t.symbol||'-'}</span>
          <span class="dir-badge ${t.direction}">${(t.direction||'').toUpperCase()}</span>
        </div>
        <div class="trade-pnl-card ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}$${Math.abs(pnl).toFixed(2)}</div>
      </div>
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-label">Open</div><div class="meta-val">${openT||'-'}</div></div>
        <div class="meta-item"><div class="meta-label">Close</div><div class="meta-val">${closeT||'-'}</div></div>
        <div class="meta-item"><div class="meta-label">Duration</div><div class="meta-val">${dur||'-'}</div></div>
        <div class="meta-item"><div class="meta-label">Lot Size</div><div class="meta-val">${t.lots||'-'}</div></div>
        <div class="meta-item"><div class="meta-label">Entry</div><div class="meta-val">${t.entry||'-'}</div></div>
        <div class="meta-item"><div class="meta-label">Exit</div><div class="meta-val">${t.exit||'-'}</div></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('detailPanel').classList.remove('hidden');
}

function closeDetail() { document.getElementById('detailPanel').classList.add('hidden'); }

function changeMonth(dir) {
  curMonth+=dir;
  if(curMonth<0){curMonth=11;curYear--;}
  if(curMonth>11){curMonth=0;curYear++;}
  renderCal(); closeDetail();
}

function renderAll() { renderMetrics(); renderEquity(); renderCal(); }

function openAddModal() {
  const now = new Date();
  const fmt = d => d.toISOString().slice(0,16);
  document.getElementById('f_open').value = fmt(now);
  document.getElementById('f_close').value = fmt(now);
  document.getElementById('formMsg').innerHTML = '';
  document.getElementById('addModal').classList.add('open');
}

async function submitTrade() {
  const sym=document.getElementById('f_sym').value;
  const dir=document.getElementById('f_dir').value;
  const open_time=document.getElementById('f_open').value;
  const close_time=document.getElementById('f_close').value;
  const entry=parseFloat(document.getElementById('f_entry').value);
  const exit=parseFloat(document.getElementById('f_exit').value);
  const lots=parseFloat(document.getElementById('f_lots').value);
  const pnl=parseFloat(document.getElementById('f_pnl').value);
  if(!open_time||!close_time||isNaN(entry)||isNaN(exit)||isNaN(lots)||isNaN(pnl)) {
    document.getElementById('formMsg').innerHTML='<div class="form-msg error">⚠ All fields are required!</div>';
    return;
  }
  const btn=document.getElementById('submitBtn');
  btn.textContent='Saving...';btn.disabled=true;
  try {
    await fetch(API+'/trade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:sym,direction:dir,open_time,close_time,entry,exit,lots,pnl})});
    document.getElementById('formMsg').innerHTML='<div class="form-msg success">✓ Trade saved successfully!</div>';
    setTimeout(()=>{closeModal();loadTrades();},1000);
  } catch(e) {
    document.getElementById('formMsg').innerHTML='<div class="form-msg error">✗ Failed to save. Please try again.</div>';
  }
  btn.textContent='Save Trade';btn.disabled=false;
}

function closeModal() { document.getElementById('addModal').classList.remove('open'); }

loadTrades();
</script>
</body>
</html>
